backend:
  - backend/**/*

frontend:
  - frontend/**/*

docs:
  - '**/*.md'
  - docs/**

ci:
  - '.github/workflows/**'
  - '.github/**/*.{yml,yaml}'
  - renovate.json

ai-ml:
  - backend/src/modules/ai/**
  - backend/src/config/ai.js

database:
  - backend/migrations/**
  - backend/seeds/**
  - '**/*migration*'
  - '**/*schema*'

tests:
  - '**/*.test.js'
  - '**/*.spec.js'
  - backend/tests/**

dependencies:
  - '**/package.json'
  - '**/package-lock.json'
  - renovate.json

security:
  - backend/src/middleware/auth*
  - backend/src/middleware/**/auth*
  - backend/src/utils/hierarchy.js