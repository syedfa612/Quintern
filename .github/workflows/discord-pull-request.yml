name: Discord — Pull Request Events (#github-feed)

on:
  pull_request:
    types: [opened, reopened, closed, ready_for_review]

concurrency:
  group: discord-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Build & send Discord embed
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const action = context.payload.action;
            const merged = pr.merged === true;
            const closed = action === 'closed' && !merged;
            const ready = action === 'ready_for_review';

            const statusEmoji = merged ? '🟣' : (closed ? '⚫' : (ready ? '✅' : '🆕'));
            const statusLabel = merged ? 'MERGED' : (closed ? 'CLOSED' : (ready ? 'READY FOR REVIEW' : 'OPENED'));

            const color = merged ? 0xa855f7 : (closed ? 0x6b7280 : 0x8b5cf6); // purple / gray / violet
            const embed = {
              title: `${statusEmoji} [PR] ${pr.title}`,
              url: pr.html_url,
              color: color,
              author: {
                name: pr.user.login,
                icon_url: pr.user.avatar_url,
                url: pr.user.html_url
              },
              description: (pr.body || '').substring(0, 300) + ((pr.body || '').length > 300 ? '…' : ''),
              fields: [
                { name: '📦 Repo', value: `${context.repo.owner}/${context.repo.repo}`, inline: true },
                { name: '🔀 Branch', value: `\`${pr.head.ref}\` → \`${pr.base.ref}\``, inline: true },
                { name: '📊 Status', value: statusLabel, inline: true },
                { name: '🧾 Commits', value: `${pr.commits}`, inline: true },
                { name: '➕ Additions', value: `+${pr.additions}`, inline: true },
                { name: '➖ Deletions', value: `-${pr.deletions}`, inline: true }
              ],
              footer: {
                text: `Quintern • github-feed • #${pr.number}`,
                icon_url: 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'
              },
              timestamp: new Date().toISOString()
            };

            const res = await fetch("${{ secrets.DISCORD_WEBHOOK_FEED }}", {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username: 'Quintern Bot', embeds: [embed] })
            });
            if (!res.ok) core.setFailed(`Discord webhook failed: ${res.status} ${await res.text()}`);
