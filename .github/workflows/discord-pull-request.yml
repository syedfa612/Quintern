name: Discord — Pull Request Events (#github-feed)

on:
  pull_request:
    types: [opened, reopened, closed, ready_for_review]

concurrency:
  group: discord-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord embed
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FEED }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          set -euo pipefail
          read -r TITLE NUMBER BODY URL USER USER_ICON USER_URL HEAD BASE COMMITS ADDITIONS DELETIONS < <(jq -r '
            [.pull_request.title, (.pull_request.number|tostring), (.pull_request.body // ""), .pull_request.html_url, .pull_request.user.login, .pull_request.user.avatar_url, .pull_request.user.html_url, .pull_request.head.ref, .pull_request.base.ref, (.pull_request.commits|tostring), ("+" + (.pull_request.additions|tostring)), ("-" + (.pull_request.deletions|tostring))] | @tsv
          ' <<< "$EVENT_PAYLOAD")

          if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            EMOJI="🟣"; STATUS="MERGED"; COLOR=11035093
          elif [ "$ACTION" = "closed" ]; then
            EMOJI="⚫"; STATUS="CLOSED"; COLOR=7039851
          elif [ "$ACTION" = "ready_for_review" ]; then
            EMOJI="✅"; STATUS="READY FOR REVIEW"; COLOR=9128191
          else
            EMOJI="🆕"; STATUS="OPENED"; COLOR=9128191
          fi

          DESC="${BODY:0:300}"
          if [ ${#BODY} -gt 300 ]; then DESC="${DESC}…"; fi

          EMBED=$(jq -n \
            --arg title "$EMOJI [PR] $TITLE" \
            --arg url "$URL" \
            --arg desc "$DESC" \
            --arg author "$USER" \
            --arg icon "$USER_ICON" \
            --arg author_url "$USER_URL" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "\`$HEAD\` → \`$BASE\`" \
            --arg status "$STATUS" \
            --arg commits "$COMMITS" \
            --arg add "$ADDITIONS" \
            --arg del "$DELETIONS" \
            --arg footer "Quintern • github-feed • #$NUMBER" \
            '{
              title: $title, url: $url, description: $desc, color: '$COLOR',
              author: { name: $author, icon_url: $icon, url: $author_url },
              fields: [
                { name: "📦 Repo", value: $repo, inline: true },
                { name: "🔀 Branch", value: $branch, inline: true },
                { name: "📊 Status", value: $status, inline: true },
                { name: "🧾 Commits", value: $commits, inline: true },
                { name: "➕ Additions", value: $add, inline: true },
                { name: "➖ Deletions", value: $del, inline: true }
              ],
              footer: { text: $footer, icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" },
              timestamp: (now | todate)
            }')
          PAYLOAD=$(jq -n --arg embed "$EMBED" '{username: "Quintern Bot", embeds: [$embed | fromjson]}')
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$DISCORD_WEBHOOK")
          echo "Discord webhook returned: HTTP $HTTP"
          if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then exit 1; fi
