name: Discord — Pull Request Events (#github-feed)

on:
  pull_request:
    types: [opened, reopened, closed, ready_for_review]
    branches-ignore:
      - 'dependabot/**'

concurrency:
  group: discord-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord embed
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FEED }}
          REPO: ${{ github.repository }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --arg action "$ACTION" \
            --argjson merged_bool $([ "$MERGED" = "true" ] && echo true || echo false) \
            --argjson event "$EVENT_PAYLOAD" \
            '
            def emoji_status:
              if $action == "closed" and $merged_bool then {e:"🟣", s:"MERGED", c:11035093}
              elif $action == "closed" then {e:"⚫", s:"CLOSED", c:7039851}
              elif $action == "ready_for_review" then {e:"✅", s:"READY FOR REVIEW", c:9128191}
              else {e:"🆕", s:"OPENED", c:9128191}
              end;
            def short_desc:
              ($event.pull_request.body // "" |
                if length == 0 then "no description"
                elif length > 300 then .[0:300] + "…"
                else .
                end);
            def pr:
              $event.pull_request;
            (emoji_status) as $es |
            {
              username: "Quintern Bot",
              embeds: [{
                title: "\($es.e) [PR] #\($event.pull_request.number) \($event.pull_request.title)",
                url: $event.pull_request.html_url,
                color: $es.c,
                author: {
                  name: $event.pull_request.user.login,
                  icon_url: $event.pull_request.user.avatar_url,
                  url: $event.pull_request.user.html_url
                },
                fields: [
                  { name: "📦 Repo", value: $repo, inline: true },
                  { name: "📊 Status", value: $es.s, inline: true },
                  { name: "🔀 Branch", value: "`\($event.pull_request.head.ref)` → `\($event.pull_request.base.ref)`", inline: true },
                  { name: "🧾 Commits", value: ($event.pull_request.commits | tostring), inline: true },
                  { name: "➕ Additions", value: ("+" + ($event.pull_request.additions | tostring)), inline: true },
                  { name: "➖ Deletions", value: ("-" + ($event.pull_request.deletions | tostring)), inline: true },
                  { name: "📝 Description", value: short_desc, inline: false }
                ],
                footer: { text: ("Quintern • github-feed • #\($event.pull_request.number)"), icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" },
                timestamp: (now | todate)
              }]
            }
            ')
          HTTP=$(curl -sS --max-time 15 --retry 3 --retry-delay 2 --retry-connrefused \
              -o /dev/null -w "%{http_code}" -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$DISCORD_WEBHOOK")
          echo "Discord webhook returned: HTTP $HTTP"
          if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then exit 1; fi
