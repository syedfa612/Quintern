name: Discord — Branch Events (#github-feed)

on:
  create:
  delete:

concurrency:
  group: discord-branch-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord embed
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FEED }}
          REF: ${{ github.event.ref }}
          REF_TYPE: ${{ github.event.ref_type }}
          EVENT_NAME: ${{ github.event_name }}
          SENDER: ${{ github.event.sender.login }}
          SENDER_ICON: ${{ github.event.sender.avatar_url }}
          SENDER_URL: ${{ github.event.sender.html_url }}
        run: |
          set -euo pipefail
          if [ "$REF_TYPE" != "branch" ]; then
            echo "Skipping non-branch event (ref_type=$REF_TYPE)"; exit 0
          fi
          if [ "$EVENT_NAME" = "delete" ]; then
            EMOJI="🗑️"; STATUS="DELETED"; COLOR=7039851
          else
            EMOJI="🌱"; STATUS="CREATED"; COLOR=11141275
          fi
          EMBED=$(jq -n \
            --arg title "$EMOJI Branch $STATUS: \`$REF\`" \
            --arg author "$SENDER" \
            --arg icon "$SENDER_ICON" \
            --arg author_url "$SENDER_URL" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "\`$REF\`" \
            --arg status "$STATUS" \
            '{
              title: $title, color: '$COLOR',
              author: { name: $author, icon_url: $icon, url: $author_url },
              fields: [
                { name: "📦 Repo", value: $repo, inline: true },
                { name: "🌿 Branch", value: $branch, inline: true },
                { name: "⚙️ Action", value: $status, inline: true }
              ],
              footer: { text: "Quintern • github-feed", icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" },
              timestamp: (now | todate)
            }')
          PAYLOAD=$(jq -n --arg embed "$EMBED" '{username: "Quintern Bot", embeds: [$embed | fromjson]}')
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$DISCORD_WEBHOOK")
          echo "Discord webhook returned: HTTP $HTTP"
          if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then exit 1; fi
