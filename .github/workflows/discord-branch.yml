name: Discord — Branch Events (#github-feed)

on:
  create:
  delete:

concurrency:
  group: discord-branch-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Build & send Discord embed
        uses: actions/github-script@v7
        with:
          script: |
            const ref = context.payload.ref;
            const refType = context.payload.ref_type; // 'branch' or 'tag'
            if (refType !== 'branch') return;
            const action = context.eventName; // 'create' or 'delete'
            const sender = context.payload.sender;

            const emoji = action === 'delete' ? '🗑️' : '🌱';
            const label = action === 'delete' ? 'DELETED' : 'CREATED';
            const color = action === 'delete' ? 0x6b7280 : 0x10b981; // gray / green

            const embed = {
              title: `${emoji} Branch ${label}: \`${ref}\``,
              color: color,
              author: {
                name: sender.login,
                icon_url: sender.avatar_url,
                url: sender.html_url
              },
              fields: [
                { name: '📦 Repo', value: `${context.repo.owner}/${context.repo.repo}`, inline: true },
                { name: '🌿 Branch', value: `\`${ref}\``, inline: true },
                { name: '⚙️ Action', value: label, inline: true }
              ],
              footer: {
                text: 'Quintern • github-feed',
                icon_url: 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'
              },
              timestamp: new Date().toISOString()
            };

            const res = await fetch("${{ secrets.DISCORD_WEBHOOK_FEED }}", {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username: 'Quintern Bot', embeds: [embed] })
            });
            if (!res.ok) core.setFailed(`Discord webhook failed: ${res.status} ${await res.text()}`);
