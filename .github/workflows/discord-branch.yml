name: Discord — Branch Events (#github-feed)

on:
  create:
  delete:

concurrency:
  group: discord-branch-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord embed
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FEED }}
          REPO: ${{ github.repository }}
          REF_TYPE: ${{ github.event.ref_type }}
          REF: ${{ github.event.ref }}
          SENDER: ${{ github.actor }}
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --arg ref_type "$REF_TYPE" \
            --arg ref "$REF" \
            --arg sender "$SENDER" \
            --argjson event "$EVENT_PAYLOAD" \
            '
            def emoji_status:
              if $ref_type == "branch" then
                if $event.action == "deleted" then {e:"🗑️", s:"BRANCH DELETED", c:7039851}
                else {e:"🌿", s:"BRANCH CREATED", c:3012387}
                end
              elif $ref_type == "tag" then
                if $event.action == "deleted" then {e:"🗑️", s:"TAG DELETED", c:7039851}
                else {e:"🏷️", s:"TAG CREATED", c:11035093}
                end
              else {e:"📌", s:($ref_type | ascii_upcase), c:9128191}
              end;
            def short_ref:
              $ref | ltrimstr("refs/heads/") | ltrimstr("refs/tags/");
            (emoji_status) as $es |
            {
              username: "Quintern Bot",
              embeds: [{
                title: "\($es.e) [\($ref_type | ascii_upcase)] \(short_ref)",
                url: "https://github.com/\($repo)/tree/\(short_ref)",
                color: $es.c,
                author: {
                  name: $sender,
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
                  url: "https://github.com/\($sender)"
                },
                fields: [
                  { name: "📦 Repo", value: $repo, inline: true },
                  { name: "📊 Status", value: $es.s, inline: true },
                  { name: "🔗 Ref", value: ("`\($ref)`"), inline: true }
                ],
                footer: { text: "Quintern • github-feed", icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" },
                timestamp: (now | todate)
              }]
            }
            ')
          HTTP=$(curl -sS --max-time 15 --retry 3 --retry-delay 2 --retry-connrefused \
              -o /dev/null -w "%{http_code}" -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$DISCORD_WEBHOOK")
          echo "Discord webhook returned: HTTP $HTTP"
          if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then exit 1; fi
