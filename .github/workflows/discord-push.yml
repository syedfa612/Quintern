name: Discord — Push Events (#github-feed)

on:
  push:
    branches-ignore:
      - 'dependabot/**'

concurrency:
  group: discord-push-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Build & send Discord embed
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FEED }}
        with:
          script: |
            const push = context.payload;
            const branch = push.ref.replace('refs/heads/', '');
            const commits = push.commits || [];
            const head = commits.length > 0 ? commits[commits.length - 1] : null;
            const total = commits.length;
            const shown = commits.slice(0, 3).map(c => `[\`${c.id.substring(0, 7)}\`](${c.url}) ${c.message.split('\n')[0].substring(0, 80)} — ${c.author.name}`).join('\n');
            const more = total > 3 ? `\n…and **${total - 3}** more` : '';

            const embed = {
              title: `📥 Push to \`${branch}\``,
              description: shown + more,
              color: 0x10b981,
              author: {
                name: push.pusher.name,
                icon_url: `https://github.com/${push.pusher.name}.png?size=64`,
                url: `https://github.com/${push.pusher.name}`
              },
              fields: [
                { name: '📦 Repo', value: `${context.repo.owner}/${context.repo.repo}`, inline: true },
                { name: '🌿 Branch', value: `\`${branch}\``, inline: true },
                { name: '🔢 Commits', value: `${total}`, inline: true }
              ],
              footer: {
                text: 'Quintern • github-feed',
                icon_url: 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'
              },
              timestamp: new Date().toISOString()
            };
            if (head) embed.url = head.url;

            const webhook = process.env.DISCORD_WEBHOOK;
            if (!webhook) throw new Error('DISCORD_WEBHOOK secret is empty');
            const res = await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username: 'Quintern Bot', embeds: [embed] })
            });
            if (!res.ok) core.setFailed(`Discord webhook failed: ${res.status} ${await res.text()}`);
