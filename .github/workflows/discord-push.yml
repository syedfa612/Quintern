name: Discord — Push Events (#github-feed)

on:
  push:
    branches: ['**']
    tags: ['**']

concurrency:
  group: discord-push-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord embed
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FEED }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
          REF_TYPE: ${{ github.ref_type }}
          PUSHER: ${{ github.actor }}
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --arg ref "$REF" \
            --arg ref_type "$REF_TYPE" \
            --arg pusher "$PUSHER" \
            --argjson event "$EVENT_PAYLOAD" \
            '
            def short_ref:
              $ref | ltrimstr("refs/heads/") | ltrimstr("refs/tags/");
            def ref_url:
              if $ref_type == "tag" then "https://github.com/\($repo)/releases/tag/\(short_ref)"
              else "https://github.com/\($repo)/tree/\(short_ref)"
              end;
            def emoji_status:
              if $ref_type == "tag" then {e:"🏷️", s:"TAG PUSHED", c:11035093}
              elif $ref_type == "branch" then {e:"📥", s:"PUSH", c:9128191}
              else {e:"📥", s:"PUSH", c:9128191}
              end;
            def commits_text:
              ($event.commits // [] |
                if length == 0 then "no commits"
                else map("`" + (.id[0:7]) + "` " + .message) | join("\n")
                end);
            def commit_count:
              ($event.commits // [] | length | tostring);
            (emoji_status) as $es |
            {
              username: "Quintern Bot",
              embeds: [{
                title: "\($es.e) [Push] \(short_ref)",
                url: ref_url,
                color: $es.c,
                author: {
                  name: $pusher,
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
                  url: "https://github.com/\($pusher)"
                },
                fields: [
                  { name: "📦 Repo", value: $repo, inline: true },
                  { name: "📊 Status", value: $es.s, inline: true },
                  { name: "🔢 Commits", value: commit_count, inline: true },
                  { name: "📝 Detail", value: commits_text, inline: false }
                ],
                footer: { text: "Quintern • github-feed", icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" },
                timestamp: (now | todate)
              }]
            }
            ')
          HTTP=$(curl -sS --max-time 15 --retry 3 --retry-delay 2 --retry-connrefused \
              -o /dev/null -w "%{http_code}" -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$DISCORD_WEBHOOK")
          echo "Discord webhook returned: HTTP $HTTP"
          if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then exit 1; fi
