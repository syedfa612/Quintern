name: Stale

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: 'This issue has been inactive for 30 days. Please update or it will be closed in 7 days.'
          stale-pr-message: 'This PR has been inactive for 30 days. Please rebase or it will be closed in 7 days.'
          close-issue-message: 'Closing this issue due to inactivity. Feel free to reopen if still relevant.'
          close-pr-message: 'Closing this PR due to inactivity. Feel free to reopen if still relevant.'
          only: issues
          exempt-issue-labels: 'pinned,security,urgent,good first issue,help wanted'
          operations: 'close'
          repo-token: ${{ secrets.GITHUB_TOKEN }}