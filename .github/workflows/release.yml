name: 🚀 Release

# Auto-build and publish a GitHub Release whenever a semver tag is pushed.
# Usage:  git tag v2026.06.1 && git push --tags origin main
# Then this workflow:
#   1. Builds backend + frontend (Vite production build → dist/)
#   2. Zips the artifacts
#   3. Creates a GitHub Release with auto-generated notes

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2026.06.1)'
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install backend + frontend deps
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Run CI gates (migrations + jest)
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/release_gate
          JWT_ACCESS_SECRET: release-gate-access-secret
          JWT_REFRESH_SECRET: release-gate-refresh-secret
          JWT_SECRET: release-gate-secret
          AI_PROVIDER: heuristic
        run: |
          cd backend
          # Spin up a throwaway Postgres just for the gate
          docker run -d --name pg-gate -e POSTGRES_PASSWORD=postgres -e POSTGRES_USER=postgres -e POSTGRES_DB=release_gate -p 5432:5432 postgres:18
          for i in $(seq 1 30); do pg_isready -h localhost -p 5432 -U postgres && break; sleep 1; done
          npm run migrate
          npm test -- --forceExit --detectOpenHandles --runInBand
          docker rm -f pg-gate

      - name: Build frontend
        run: |
          cd frontend
          npm run build
          echo "Frontend built: $(du -sh dist | cut -f1)"

      - name: Package artifacts
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p release-artifacts
          # Frontend SPA
          (cd frontend && tar -czf "../release-artifacts/frontend-${TAG}.tar.gz" dist)
          # Backend runtime
          (cd backend && tar -czf "../release-artifacts/backend-${TAG}.tar.gz" \
            --exclude=node_modules --exclude=coverage --exclude=uploads \
            --exclude=.env --exclude=__tests__ --exclude=tests \
            --exclude='*.test.js' .)
          # Docker compose
          tar -czf "release-artifacts/docker-${TAG}.tar.gz" \
            docker-compose.production.yml Dockerfile

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 'Quintern Workforce Platform ${{ steps.tag.outputs.tag }}'
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-rc') || contains(steps.tag.outputs.tag, '-beta') }}
          files: |
            release-artifacts/frontend-${{ steps.tag.outputs.tag }}.tar.gz
            release-artifacts/backend-${{ steps.tag.outputs.tag }}.tar.gz
            release-artifacts/docker-${{ steps.tag.outputs.tag }}.tar.gz
          body: |
            ## Quintern Workforce Platform — ${{ steps.tag.outputs.tag }}

            Auto-built from commit `${{ github.sha }}` on branch `${{ github.ref_name }}`.

            ### What's included
            - **Backend** (Fastify + PostgreSQL + JWT) — `backend-${{ steps.tag.outputs.tag }}.tar.gz`
            - **Frontend** (React + Vite) — `frontend-${{ steps.tag.outputs.tag }}.tar.gz`
            - **Docker compose** (production stack) — `docker-${{ steps.tag.outputs.tag }}.tar.gz`

            ### Deploy
            ```bash
            # Pull + run
            docker compose -f docker-compose.production.yml up -d

            # Or extract and run manually
            tar -xzf backend-${{ steps.tag.outputs.tag }}.tar.gz
            cd backend && npm ci --production && node src/app.js
            tar -xzf frontend-${{ steps.tag.outputs.tag }}.tar.gz
            ```

            See `README.md` for full configuration and `.env.example` for environment variables.

            _Generated automatically by the Release workflow._

      - name: Cleanup
        if: always()
        run: rm -rf release-artifacts
