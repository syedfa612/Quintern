name: Discord — PR Review Comments (#github-feed)

on:
  pull_request_review_comment:
    types: [created, edited]

concurrency:
  group: discord-review-${{ github.event.pull_request.number }}-${{ github.event.comment.id }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord embed
        if: github.event.pull_request.user.login != 'dependabot[bot]' && github.event.comment.user.login != 'dependabot[bot]'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FEED }}
          ACTION: ${{ github.event.action }}
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg repo "${GITHUB_REPOSITORY:-}" \
            --arg action "$ACTION" \
            --argjson event "$EVENT_PAYLOAD" \
            '
            def short_body:
              ($event.comment.body // "" |
                if length == 0 then "no comment text"
                elif length > 400 then .[0:400] + "…"
                else .
                end);
            def short_pr_title:
              ($event.pull_request.title // "" |
                if length > 60 then .[0:60]
                else .
                end);
            {
              username: "Quintern Bot",
              embeds: [{
                title: ("💬 Review comment on PR #\($event.pull_request.number)"),
                url: $event.comment.html_url,
                color: 16098892,
                author: {
                  name: $event.comment.user.login,
                  icon_url: $event.comment.user.avatar_url,
                  url: $event.comment.user.html_url
                },
                fields: [
                  { name: "📦 Repo", value: $repo, inline: true },
                  { name: "📄 File", value: ("`\($event.comment.path)`"), inline: true },
                  { name: "📝 PR", value: short_pr_title, inline: false },
                  { name: "💬 Comment", value: short_body, inline: false }
                ],
                footer: { text: ("Quintern • github-feed • " + ($action | ascii_upcase)), icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" },
                timestamp: (now | todate)
              }]
            }
            ')
          HTTP=$(curl -sS --max-time 15 --retry 3 --retry-delay 2 --retry-connrefused \
              -o /dev/null -w "%{http_code}" -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$DISCORD_WEBHOOK")
          echo "Discord webhook returned: HTTP $HTTP"
          if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then exit 1; fi
