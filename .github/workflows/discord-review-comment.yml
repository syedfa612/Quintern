name: Discord — PR Review Comments (#github-feed)

on:
  pull_request_review_comment:
    types: [created, edited]

concurrency:
  group: discord-review-${{ github.event.pull_request.number }}-${{ github.event.comment.id }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Build & send Discord embed
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment;
            const pr = context.payload.pull_request;
            const action = context.payload.action;

            const color = 0xf59e0b; // orange
            const body = (comment.body || '').substring(0, 400) + ((comment.body || '').length > 400 ? '…' : '');

            const embed = {
              title: `💬 Review comment on PR #${pr.number}`,
              url: comment.html_url,
              color: color,
              author: {
                name: comment.user.login,
                icon_url: comment.user.avatar_url,
                url: comment.user.html_url
              },
              description: body,
              fields: [
                { name: '📦 Repo', value: `${context.repo.owner}/${context.repo.repo}`, inline: true },
                { name: '📄 File', value: `\`${comment.path}\``, inline: true },
                { name: '📝 PR', value: pr.title.substring(0, 60), inline: false }
              ],
              footer: {
                text: `Quintern • github-feed • ${action.toUpperCase()}`,
                icon_url: 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'
              },
              timestamp: new Date().toISOString()
            };

            const res = await fetch("${{ secrets.DISCORD_WEBHOOK_FEED }}", {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username: 'Quintern Bot', embeds: [embed] })
            });
            if (!res.ok) core.setFailed(`Discord webhook failed: ${res.status} ${await res.text()}`);
