name: Format Check

on:
  push:
    branches:
      - main
      - 'feature/*'
      - 'release/*'
  pull_request:
    branches:
      - main
      - 'release/*'

concurrency:
  group: format-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  format:
    name: Prettier Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Run Prettier check
        env:
          CI: true
        run: |
          set -o pipefail
          npx --yes prettier@3 --check . > prettier.log 2>&1 || {
            echo "::group::Prettier output (first 100 lines)"
            head -100 prettier.log || true
            echo "::endgroup::"
            echo "::error::Prettier found unformatted files. Run 'npx prettier --write .' locally and push again."
            exit 1
          }
          echo "✓ All files match Prettier code style"
