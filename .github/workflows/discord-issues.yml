name: Discord — Issue Events (#github-feed)

on:
  issues:
    types: [opened, reopened, closed, assigned, labeled]

concurrency:
  group: discord-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Build & send Discord embed
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const action = context.payload.action;
            const closed = action === 'closed';
            const opened = action === 'opened' || action === 'reopened';

            const statusEmoji = closed ? '✅' : (opened ? '🆕' : '🏷️');
            const statusLabel = closed ? 'CLOSED' : (opened ? 'OPENED' : action.toUpperCase());

            const color = closed ? 0x3b82f6 : 0x60a5fa; // blue family
            const labels = (issue.labels || []).map(l => `\`${l.name}\``).join(' ') || '`none`';
            const assignees = (issue.assignees || []).map(a => a.login).map(u => `@${u}`).join(' ') || '`unassigned`';

            const embed = {
              title: `${statusEmoji} [Issue] ${issue.title}`,
              url: issue.html_url,
              color: color,
              author: {
                name: issue.user.login,
                icon_url: issue.user.avatar_url,
                url: issue.user.html_url
              },
              description: (issue.body || '').substring(0, 300) + ((issue.body || '').length > 300 ? '…' : ''),
              fields: [
                { name: '📦 Repo', value: `${context.repo.owner}/${context.repo.repo}`, inline: true },
                { name: '📊 Status', value: statusLabel, inline: true },
                { name: '🏷️ Labels', value: labels, inline: false },
                { name: '👥 Assignees', value: assignees, inline: false }
              ],
              footer: {
                text: `Quintern • github-feed • #${issue.number}`,
                icon_url: 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'
              },
              timestamp: new Date().toISOString()
            };

            const res = await fetch("${{ secrets.DISCORD_WEBHOOK_FEED }}", {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username: 'Quintern Bot', embeds: [embed] })
            });
            if (!res.ok) core.setFailed(`Discord webhook failed: ${res.status} ${await res.text()}`);
