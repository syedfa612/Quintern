name: Discord — Issue Events (#github-feed)

on:
  issues:
    types: [opened, reopened, closed, assigned, labeled]

concurrency:
  group: discord-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord embed
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FEED }}
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          set -euo pipefail

          jq -n --argjson event "$EVENT_PAYLOAD" --arg repo "$GITHUB_REPOSITORY" '
            def action: $event.action;
            def issue: $event.issue;
            def labels_text:
              ([issue.labels[].name] | map("`" + . + "`") | join(" ")) // "`none`";
            def assignees_text:
              ([issue.assignees[].login] | map("@" + .) | join(" ")) // "`unassigned`";
            def emoji_status:
              if action == "closed" then {e:"✅", s:"CLOSED", c:3898326}
              elif (action == "opened" or action == "reopened") then
                {e:"🆕", s:(action | ascii_upcase), c:6323599}
              else {e:"🏷️", s:(action | ascii_upcase), c:6323599}
              end;
            def clean_body:
              (issue.body // "" | gsub("(^|\n)#+\\s?"; "\n") | ltrimstr("\n"))[0:300]
              + (if (issue.body // "" | length) > 300 then "…" else "" end);
            (emoji_status) as $es |
            {
              username: "Quintern Bot",
              embeds: [{
                title: "\($es.e) [Issue] \(issue.title)",
                url: issue.html_url,
                description: clean_body,
                color: $es.c,
                author: {
                  name: issue.user.login,
                  icon_url: issue.user.avatar_url,
                  url: issue.user.html_url
                },
                fields: [
                  { name: "📦 Repo", value: $repo, inline: true },
                  { name: "📊 Status", value: $es.s, inline: true },
                  { name: "🏷️ Labels", value: labels_text, inline: false },
                  { name: "👥 Assignees", value: assignees_text, inline: false }
                ],
                footer: {
                  text: "Quintern • github-feed • #\(issue.number)",
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                timestamp: (now | todate)
              }]
            }' | curl -sS --max-time 15 --retry 3 --retry-delay 2 --retry-connrefused \
              -o /dev/null -w "%{http_code}" -X POST \
              -H 'Content-Type: application/json' \
              -d @- \
              "$DISCORD_WEBHOOK" | {
                read -r code
                echo "Discord webhook returned: HTTP $code"
                if [ "$code" != "204" ] && [ "$code" != "200" ]; then exit 1; fi
              }
